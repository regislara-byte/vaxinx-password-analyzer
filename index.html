<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VAXINX Password Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root {
  --cyan: #00f5ff;
  --red: #ff0044;
  --green: #00ff88;
  --yellow: #ffe600;
  --orange: #ff7c1e;
  --bg: #030c14;
  --panel: rgba(4, 18, 32, 0.92);
  --border: rgba(0, 245, 255, 0.18);
  --muted: #3a5a72;
  --text: #b0d4e8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
  position:relative;
}

/* GRID */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:0;
  pointer-events:none;
}

/* SCANLINE */

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:
  repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  z-index:0;
  pointer-events:none;
}

.main-wrapper{
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px 100px;
  position:relative;
  z-index:1;
}

/* PANEL */

.panel{
  width:100%;
  max-width:560px;
  background:rgba(4,18,32,0.92);
  border:1px solid rgba(0,245,255,0.15);
  backdrop-filter:blur(18px);
  box-shadow:
    0 0 60px rgba(0,245,255,0.08),
    0 0 120px rgba(0,245,255,0.04);
  overflow:hidden;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  border-bottom:1px solid rgba(0,245,255,0.08);
  background:rgba(0,245,255,0.03);
}

.topbar-left{
  display:flex;
  gap:6px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.red{background:#ff5f57;}
.yellow{background:#febc2e;}
.green{background:#28c840;}

.topbar-title{
  font-size:10px;
  letter-spacing:2px;
  font-family:'Share Tech Mono', monospace;
  color:var(--muted);
}

/* HEADER */

.header{
  padding:35px 30px;
  text-align:center;
  border-bottom:1px solid rgba(0,245,255,0.08);
}

.badge{
  font-size:10px;
  letter-spacing:4px;
  color:var(--cyan);
  margin-bottom:14px;
  font-family:'Share Tech Mono', monospace;
}

h1{
  font-family:'Orbitron',sans-serif;
  font-size:32px;
  line-height:1.1;
  margin-bottom:10px;
  background:linear-gradient(135deg,#fff 0%, var(--cyan) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  font-family:'Share Tech Mono', monospace;
}

/* BODY */

.body{
  padding:28px;
}

.input-wrap{
  position:relative;
  margin-bottom:20px;
}

.input-wrap input{
  width:100%;
  padding:16px 50px 16px 18px;
  background:rgba(0,245,255,0.03);
  border:1px solid rgba(0,245,255,0.15);
  color:#fff;
  outline:none;
  font-size:14px;
  font-family:'Share Tech Mono', monospace;
}

.input-wrap input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 16px rgba(0,245,255,0.15);
}

.toggle-btn{
  position:absolute;
  top:50%;
  right:14px;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:var(--cyan);
  cursor:pointer;
  font-size:11px;
  letter-spacing:1px;
}

/* METER */

.meter-wrap{
  margin-bottom:20px;
}

.meter-label{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:10px;
  color:var(--muted);
  letter-spacing:2px;
  font-family:'Share Tech Mono', monospace;
}

.meter{
  height:6px;
  background:rgba(255,255,255,0.05);
}

.bar{
  height:100%;
  width:0%;
  background:var(--cyan);
  transition:0.3s;
}

/* STATUS */

.status-row{
  padding:20px;
  text-align:center;
  border:1px solid rgba(0,245,255,0.08);
  margin-bottom:20px;
  background:rgba(0,0,0,0.25);
}

.status-text{
  font-family:'Orbitron',sans-serif;
  font-size:24px;
  margin-bottom:5px;
}

.status-sub{
  font-size:11px;
  color:var(--muted);
  letter-spacing:2px;
  font-family:'Share Tech Mono', monospace;
}

/* FOOTER ICONS */

.vaxinx-footer{
  margin-top:60px;
  text-align:center;
}

.footer-icons{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.footer-icons a{
  text-decoration:none;
}

.footer-icons img{
  width:52px;
  height:52px;
  padding:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(0,245,255,0.08);
  transition:0.3s ease;
}

.footer-icons img:hover{
  transform:translateY(-5px) scale(1.08);
  box-shadow:0 0 20px rgba(0,245,255,0.35);
}

.footer-text{
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  font-family:'Share Tech Mono', monospace;
}

/* MOBILE */

@media(max-width:700px){

  h1{
    font-size:24px;
  }

  .panel{
    max-width:100%;
  }

  .body{
    padding:22px;
  }

  .footer-icons img{
    width:46px;
    height:46px;
  }

}

</style>
</head>

<body>

<div class="main-wrapper">

  <div class="panel">

    <!-- TOPBAR -->

    <div class="topbar">

      <div class="topbar-left">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>

      <div class="topbar-title">
        VX-CDM-3.2 // LIVE
      </div>

    </div>

    <!-- HEADER -->

    <div class="header">

      <div class="badge">
        VAXINX CYBER DEFENSE MODULE
      </div>

      <h1>
        PASSWORD ANALYZER
      </h1>

      <div class="subtitle">
        // NIST/CISCO CREDENTIAL RISK ENGINE //
      </div>

    </div>

    <!-- BODY -->

    <div class="body">

      <div class="input-wrap">

        <input
          type="password"
          id="password"
          placeholder="Input credential or passphrase..."
        >

        <button class="toggle-btn" onclick="toggleVisibility()">
          SHOW
        </button>

      </div>

      <div class="meter-wrap">

        <div class="meter-label">
          <span>STRENGTH VECTOR</span>
          <span id="pct">0%</span>
        </div>

        <div class="meter">
          <div class="bar" id="bar"></div>
        </div>

      </div>

      <div class="status-row">

        <div class="status-text" id="status">
          AWAITING INPUT
        </div>

        <div class="status-sub">
          — no credential detected —
        </div>

      </div>

    </div>

  </div>

  <!-- FOOTER -->

  <footer class="vaxinx-footer">

    <div class="footer-icons">

      <a href="https://github.com/regislara-byte" target="_blank">
        <img src="assets/social_icons/github-icon.svg" alt="GitHub">
      </a>

      <a href="https://ph.pinterest.com/UrlLifeNuggets/" target="_blank">
        <img src="assets/social_icons/pinterest-icon.svg" alt="Pinterest">
      </a>

      <a href="https://www.teepublic.com/user/urlifenuggets" target="_blank">
        <img src="assets/social_icons/teepublic-icon.svg" alt="TeePublic">
      </a>

      <a href="#">
        <img src="assets/social_icons/spotify-icon.svg" alt="Spotify">
      </a>

      <a href="#">
        <img src="assets/social_icons/discord-icon.svg" alt="Discord">
      </a>

    </div>

    <p class="footer-text">
      VAXINX Protocol™ • VLA Powered • Cyber Awareness UI
    </p>

  </footer>

</div>

<script>

let visible = false;

function toggleVisibility(){

  const input = document.getElementById('password');
  const btn = document.querySelector('.toggle-btn');

  visible = !visible;

  input.type = visible ? 'text' : 'password';

  btn.textContent = visible ? 'HIDE' : 'SHOW';

}

</script>

</body>
</html>
